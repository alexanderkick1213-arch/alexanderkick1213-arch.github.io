<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi Polola ❤️</title>
    <style>
        /* Aquí va el diseño (CSS) */
        body {
            background-color: #ffe6e6; /* Un color de fondo rosado suave */
            font-family: 'Arial', sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            background-color: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 90%;
        }
        h1 {
            color: #ff4d4d;
        }
        p {
            color: #555;
            line-height: 1.6;
            font-size: 18px;
        }
        .foto-container {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            margin: 20px auto;
            overflow: hidden;
            border: 5px solid #ff4d4d;
            background-color: #ffcccc;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .foto-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .btn-sorpresa {
            background-color: #ff4d4d;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.3s;
        }
        .btn-sorpresa:hover {
            background-color: #cc0000;
        }
        #mensaje-oculto {
            display: none;
            margin-top: 20px;
            font-size: 22px;
            color: #cc0000;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- El título principal -->
        <h1>¡Hola, hermosa! ❤️</h1>

        <!-- Reemplaza "tu-foto.jpg" con el nombre real de tu foto -->
        <div class="foto-container">
            <img src="tu-foto.jpg" alt="Nuestra foto favorita" onerror="this.style.display='none'; this.parentNode.innerHTML='Falta agregar la foto'">
        </div>

        <!-- El mensaje para ella -->
        <p>Quería hacerte una sorpresa diferente y especial, así que te programé este pequeño rincón en internet solo para nosotros.</p>
        <p>Eres la mejor polola del mundo y me haces muy feliz.</p>

        <!-- El botón interactivo -->
        <button class="btn-sorpresa" onclick="mostrarSorpresa()">Haz clic aquí para una sorpresa</button>

        <!-- El mensaje que aparece al hacer clic -->
        <div id="mensaje-oculto">
            ¡Te amo muchísimo! ✨
        </div>
    </div>

    <script>
        /* Aquí va la interactividad (JavaScript) */
        function mostrarSorpresa() {
            document.getElementById('mensaje-oculto').style.display = 'block';
        }
    </script>

</body>
</html>
